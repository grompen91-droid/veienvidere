<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veienvidere – Login</title>
    <link rel="stylesheet" href="/css/home.css">
    <style>
        .auth-wrap {
            flex: 1 1 auto;
            min-height: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: clamp(20px, 3vh, 40px) clamp(16px, 4vw, 60px);
        }
        .auth-box {
            width: 100%;
            max-width: 520px;
            display: flex;
            flex-direction: column;
            gap: clamp(14px, 2.5vh, 28px);
        }
        .auth-tabs {
            display: flex;
            border-bottom: 3px solid #d9d9d9;
        }
        .auth-tab {
            flex: 1;
            padding: clamp(10px, 1.5vh, 18px);
            border: none;
            background: transparent;
            font: inherit;
            font-weight: 600;
            font-size: clamp(16px, 2.4vw, 24px);
            color: #888;
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -3px;
        }
        .auth-tab.active {
            color: #008774;
            border-bottom-color: #008774;
        }
        .auth-fields {
            display: flex;
            flex-direction: column;
            gap: clamp(12px, 2vh, 22px);
        }
        .auth-field {
            display: flex;
            flex-direction: column;
            gap: clamp(4px, 0.6vh, 8px);
        }
        .auth-label {
            font-weight: 600;
            font-size: clamp(14px, 2vw, 22px);
        }
        .auth-input {
            width: 100%;
            height: clamp(44px, 6vh, 70px);
            padding: 0 16px;
            border: 3px solid #d9d9d9;
            border-radius: 10px;
            font: inherit;
            font-size: clamp(14px, 1.8vw, 20px);
            color: #000;
        }
        .auth-input:focus {
            outline: none;
            border-color: #008774;
        }
        .auth-btn {
            height: clamp(44px, 6vh, 70px);
            border: none;
            border-radius: 10px;
            background: #008774;
            color: #fff;
            font: inherit;
            font-weight: 700;
            font-size: clamp(16px, 2.2vw, 26px);
            cursor: pointer;
        }
        .auth-btn:hover { background: #006b5e; }
        .auth-status {
            min-height: 1.4em;
            font-weight: 600;
            font-size: clamp(13px, 1.6vw, 18px);
            color: #c00;
            text-align: center;
        }
        .auth-status.ok { color: #008774; }
        .hidden { display: none; }
    </style>
</head>
<body>

<div class="landing">

    <header class="brand-bar">
        <p class="brand-title">Veienvidere</p>
    </header>

    <div class="divider"></div>

    <div class="auth-wrap">
        <div class="auth-box">

            <div class="auth-tabs">
                <button class="auth-tab active" id="tabLogin" onclick="switchTab('login')">Log in</button>
                <button class="auth-tab" id="tabRegister" onclick="switchTab('register')">Register</button>
            </div>

            <!-- LOGIN -->
            <div id="formLogin" class="auth-fields">
                <div class="auth-field">
                    <label class="auth-label" for="loginEmail">Email</label>
                    <input id="loginEmail" class="auth-input" type="email" placeholder="jane.doe@example.com">
                </div>
                <div class="auth-field">
                    <label class="auth-label" for="loginPassword">Password</label>
                    <input id="loginPassword" class="auth-input" type="password" placeholder="••••••••">
                </div>
                <button class="auth-btn" onclick="doLogin()">Log in</button>
            </div>

            <!-- REGISTER -->
            <div id="formRegister" class="auth-fields hidden">
                <div class="auth-field">
                    <label class="auth-label" for="regFirst">First Name</label>
                    <input id="regFirst" class="auth-input" type="text" placeholder="Jane">
                </div>
                <div class="auth-field">
                    <label class="auth-label" for="regLast">Last Name</label>
                    <input id="regLast" class="auth-input" type="text" placeholder="Doe">
                </div>
                <div class="auth-field">
                    <label class="auth-label" for="regEmail">Email</label>
                    <input id="regEmail" class="auth-input" type="email" placeholder="jane.doe@example.com">
                </div>
                <div class="auth-field">
                    <label class="auth-label" for="regPhone">Phone Number</label>
                    <input id="regPhone" class="auth-input" type="tel" placeholder="+47 123 45 678">
                </div>
                <div class="auth-field">
                    <label class="auth-label" for="regPassword">Password</label>
                    <input id="regPassword" class="auth-input" type="password" placeholder="••••••••">
                </div>
                <button class="auth-btn" onclick="doRegister()">Create account</button>
            </div>

            <p class="auth-status" id="authStatus"></p>
        </div>
    </div>

</div>

<script src="/js/app.js"></script>
<script>
    // If already logged in — go to home
    if (localStorage.getItem('token')) {
        window.location.href = '/home.html';
    }
</script>

</body>
</html>
