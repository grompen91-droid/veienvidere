<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Veienvidere</title>
    <link rel="stylesheet" href="/css/home.css">
    <style>
        .brand-bar {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 clamp(16px, 3vw, 48px);
        }
        .logout-btn {
            background: transparent;
            border: 2px solid rgba(255,255,255,0.7);
            border-radius: 8px;
            color: #fff;
            font: inherit;
            font-size: clamp(13px, 1.6vw, 18px);
            font-weight: 600;
            padding: 6px 16px;
            cursor: pointer;
        }
        .logout-btn:hover { background: rgba(255,255,255,0.15); }
    </style>
</head>
<body>

<div class="landing">

    <header class="brand-bar">
        <p class="brand-title">Veienvidere</p>
        <button class="logout-btn" id="logoutBtn">Log out</button>
    </header>

    <div class="divider"></div>

    <main class="landing-body">

        <div class="intro">
            <p class="intro-title">Welcome, <span id="welcomeName">…</span></p>
            <p class="intro-text">We offer tools that can help you save money and write a CV.</p>
        </div>

        <div class="cards">
            <a class="card" href="/index.html">
                <img class="card-icon" src="/assets/bd0fdb0ce60f2f601b2c34d28b76ddfe27637444.svg" alt="">
                <span class="card-label">Create a CV</span>
            </a>
            <a class="card" href="/budget.html">
                <img class="card-icon" src="/assets/cf4a8cc601e1ee32235ec7abac3dba02e3b03a1b.svg" alt="">
                <span class="card-label">Create a budget</span>
            </a>
        </div>

    </main>

</div>

<script src="/js/app.js"></script>

</body>
</html>
